<template component="x-transcriber">
  <div class="rounded-lg p-8 space-y-6 shaddow-lg">
    <div
      class="flex items-center justify-between space-x-4 bg-darker rounded-full py-4 px-4"
    >
      <div class="text-4xl font-bold text-white pl-4">
        {{ padLeft(minutes) }}:{{ padLeft(seconds) }}
      </div>
      <button
        bind-class-name="'text-white font-bold py-4 px-4 rounded-full transition-colors duration-300 ' + (running ? 'bg-red-400 hover:bg-red-600 animate animate-pulse' : '')"
        on-click="onStart()"
        bind-disabled="!supported"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="h-8 w-8"
        >
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" x2="12" y1="19" y2="22"></line>
        </svg>
      </button>
    </div>

    <template if="transcriptions.length || playbackUrl">
      <div class="space-y-6">
        <audio ref="player" bind-src="playbackUrl" class="w-full"></audio>

        <div class="flex items-center justify-stretch text-center">
          <button
            on-click="onPlayPause()"
            class="text-white py-3 px-8 rounded-l-full bg-darker flex justify-center w-full"
          >
            <lucide-icon
              bind-icon="playing ? 'pause' : 'play'"
              size="24"
              title="Play/pause"
            ></lucide-icon>
          </button>
          <button
            class="text-white py-3 px-8 bg-darker flex justify-center w-full"
            on-click="onReset()"
          >
            <lucide-icon icon="trash-2" size="24" title="Reset"></lucide-icon>
          </button>
          <a
            class="text-white py-3 px-8 rounded-r-full bg-darker flex justify-center w-full"
            download
            filename="audio.mp3"
            bind-href="playbackUrl"
            ><lucide-icon
              icon="download"
              size="24"
              title="Download"
            ></lucide-icon
          ></a>
        </div>
        <template if="converting">
          <div class="w-2 h-6 mt-2 bg-white animate-pulse"></div>
        </template>
        <template for="next of transcriptions">
          <x-transcription
            class="block w-full text-white mt-2"
            bind-text="next"
          ></x-transcription>
        </template>
      </div>
    </template>
  </div>

  <script setup src="/components/transcriber.mjs"></script>
  <style>
    .bg-darker {
      background-color: #428958;
    }
  </style>

  <link
    rel="component"
    href="https://sodium.static.apphor.de/lucide-icon.html"
  />
</template>

<template component="x-transcription">
  <div ref="div"></div>
  <script setup>
    import { onInit, defineProp, watch, ref, templateRef } from "@li3/web";

    export default function () {
      const div = templateRef("div");
      const text = defineProp("text");

      function render() {
        div.value.innerHTML = "";
        text.value.split(" ").forEach((word, i) => {
          const d = document.createElement("span");
          d.innerText = word + " ";
          d.className = "opacity-0 transition-opacity duration-300";
          div.value.appendChild(d);
          setTimeout(() => d.classList.add("opacity-100"), 100 + 16 * i);
        });
      }

      watch(text, render);
      onInit(render);

      return { div };
    }
  </script>
</template>
